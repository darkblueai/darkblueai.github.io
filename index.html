<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chisa Taxi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#07070e;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.hero{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column}

video.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
canvas.bg{position:absolute;inset:0;width:100%;height:100%;z-index:0}

.overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(to right,rgba(0,0,0,0.93) 0%,rgba(0,0,0,0.65) 55%,rgba(0,0,0,0.25) 100%)}
.overlay2{position:absolute;inset:0;z-index:1;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 55%)}

nav{position:relative;z-index:10;padding:clamp(14px,3vh,26px) clamp(20px,5vw,50px)}
.brand{display:inline-block;font-size:clamp(26px,5vw,52px);font-weight:900;color:#F5C200;letter-spacing:clamp(5px,1.2vw,12px);text-transform:uppercase;background:#000;padding:clamp(6px,1.2vh,12px) clamp(14px,2.5vw,24px);line-height:1}

.content{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 clamp(20px,5vw,50px) clamp(20px,4vh,44px)}

.tagline{display:flex;align-items:center;gap:10px;margin-bottom:clamp(10px,2vh,18px);opacity:0;animation:fu 0.8s ease-out 0.1s forwards}
.tagline-dot{width:5px;height:5px;background:#F5C200;border-radius:50%;flex-shrink:0}
.tagline-text{color:rgba(255,255,255,0.5);font-size:clamp(8px,1.2vw,11px);font-weight:600;letter-spacing:3px;text-transform:uppercase}

.heading{line-height:0.88;margin-bottom:clamp(14px,2.5vh,24px);opacity:0;animation:fu 0.8s ease-out 0.3s forwards}
.heading div{font-size:clamp(40px,9vw,96px);font-weight:900;text-transform:uppercase;letter-spacing:clamp(-2px,-0.3vw,-1px);display:block}
.h-white{color:white}
.h-yellow{color:#F5C200}

.subtext{color:rgba(255,255,255,0.5);font-size:clamp(11px,1.5vw,14px);line-height:1.75;max-width:420px;margin-bottom:clamp(16px,2.5vh,28px);opacity:0;animation:fu 0.8s ease-out 0.5s forwards}
.subtext strong{color:white}

.cta-row{display:flex;align-items:center;gap:clamp(8px,1.5vw,12px);margin-bottom:clamp(16px,3vh,34px);flex-wrap:wrap;opacity:0;animation:fu 0.8s ease-out 0.7s forwards}

.btn-save{background:#F5C200;color:#111;font-size:clamp(9px,1.1vw,11px);font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:clamp(10px,1.8vh,14px) clamp(14px,2vw,22px);border:none;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.2s;white-space:nowrap}
.btn-save:hover{background:#e6b800}
.btn-wa{background:#25D366;color:white;font-size:clamp(9px,1.1vw,11px);font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:clamp(10px,1.8vh,14px) clamp(14px,2vw,22px);border:none;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.2s;white-space:nowrap}
.btn-wa:hover{background:#1ea855}
.call-wrap{position:relative}
.btn-call{background:transparent;color:white;font-size:clamp(9px,1.1vw,11px);font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:clamp(9px,1.6vh,13px) clamp(12px,1.8vw,20px);border:1px solid rgba(255,255,255,0.3);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.2s;white-space:nowrap}
.btn-call:hover{border-color:#F5C200;color:#F5C200}

.call-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
.call-modal-bg.open{display:flex}
.call-modal{background:#111;border:1px solid rgba(255,255,255,0.1);width:clamp(300px,90vw,520px);padding:clamp(20px,4vw,36px);position:relative}
.call-modal-title{font-size:clamp(16px,2.5vw,22px);font-weight:900;color:#F5C200;letter-spacing:4px;text-transform:uppercase;margin-bottom:clamp(16px,3vh,28px)}
.call-modal-close{position:absolute;top:clamp(12px,2vh,20px);right:clamp(12px,2vw,20px);background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:22px;line-height:1;transition:color 0.2s;padding:4px}
.call-modal-close:hover{color:white}
.call-opt{display:flex;align-items:center;gap:clamp(14px,3vw,24px);padding:clamp(16px,2.5vh,22px) clamp(16px,3vw,24px);cursor:pointer;border:1px solid rgba(255,255,255,0.1);margin-bottom:12px;transition:all 0.2s;text-decoration:none;background:rgba(255,255,255,0.03)}
.call-opt:last-child{margin-bottom:0}
.call-opt:hover{border-color:#F5C200;background:rgba(245,194,0,0.06)}
.call-carrier{font-size:clamp(11px,1.5vw,14px);font-weight:900;letter-spacing:4px;text-transform:uppercase;min-width:60px}
.tnm{color:#4caf50}
.airtel{color:#ff3c3c}
.call-num{font-size:clamp(22px,4vw,36px);font-weight:900;color:white;letter-spacing:2px;line-height:1}

.stats{display:flex;flex-wrap:wrap;opacity:0;animation:fu 0.8s ease-out 0.9s forwards}
.stat{padding-right:clamp(16px,3vw,32px);margin-right:clamp(16px,3vw,32px);border-right:1px solid rgba(255,255,255,0.1)}
.stat:last-child{border-right:none;padding-right:0;margin-right:0}
.stat-val{font-size:clamp(20px,3.5vw,38px);font-weight:900;color:white;line-height:1;letter-spacing:-1px}
.stat-val span{color:#F5C200}
.stat-label{font-size:clamp(7px,0.9vw,9px);font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:4px}

.ico{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

.call-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.call-modal-bg.open{display:flex}
.call-modal{background:#111;border:1px solid rgba(255,255,255,0.1);width:clamp(300px,88vw,500px);padding:clamp(22px,4vw,36px);position:relative}
.call-modal-title{font-size:clamp(15px,2.5vw,20px);font-weight:900;color:#F5C200;letter-spacing:5px;text-transform:uppercase;margin-bottom:clamp(18px,3vh,28px)}
.call-modal-close{position:absolute;top:clamp(14px,2vh,20px);right:clamp(14px,2vw,20px);background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:24px;line-height:1;transition:color 0.2s;padding:0}
.call-modal-close:hover{color:white}
.call-opt{display:flex;align-items:center;gap:clamp(16px,3vw,28px);padding:clamp(18px,2.8vh,26px) clamp(18px,3vw,26px);cursor:pointer;border:1px solid rgba(255,255,255,0.1);margin-bottom:12px;transition:all 0.2s;text-decoration:none;background:rgba(255,255,255,0.02)}
.call-opt:last-child{margin-bottom:0}
.call-opt:hover{border-color:#F5C200;background:rgba(245,194,0,0.05)}
.call-carrier{font-size:clamp(11px,1.6vw,14px);font-weight:900;letter-spacing:4px;text-transform:uppercase;min-width:55px}
.tnm{color:#4caf50}
.airtel{color:#ff3c3c}
.call-num{font-size:clamp(18px,3vw,28px);font-weight:900;color:white;letter-spacing:2px;line-height:1;white-space:nowrap}

@keyframes fu{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="hero">

  <video class="bg" id="bgvid" autoplay muted loop playsinline>
    <source src="https://assets.mixkit.co/videos/50989/50989-720.mp4" type="video/mp4">
  </video>
  <canvas class="bg" id="bgcanvas" style="display:none"></canvas>

  <div class="overlay"></div>
  <div class="overlay2"></div>

  <nav><div class="brand">CHISA TAXI</div></nav>

  <div class="content">
    <div class="tagline">
      <div class="tagline-dot"></div>
      <span class="tagline-text">Blantyre &amp; Surroundings — 24/7</span>
    </div>

    <div class="heading">
      <div class="h-white">SAFE.</div>
      <div class="h-white">RELIABLE.</div>
      <div class="h-yellow">FAST.</div>
    </div>

    <div class="subtext">
      Professional rides whenever you need them.<br>
      <strong>Book instantly — call, WhatsApp, or save our number.</strong>
    </div>

    <div class="cta-row">
      <button class="btn-save" onclick="saveContact()">
        <svg class="ico" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Save Contact
      </button>
      <button class="btn-wa" onclick="openWA()">
        <svg class="ico" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat on WhatsApp
      </button>
      <div class="call-wrap">
        <button class="btn-call" onclick="openCallModal()">
          <svg class="ico" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          Call Now
          <svg class="ico" style="width:11px;height:11px" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </div>

    <!-- CALL MODAL -->
    <div class="call-modal-bg" id="callModal" onclick="bgClose(event)">
      <div class="call-modal">
        <div class="call-modal-title">Choose Network</div>
        <button class="call-modal-close" onclick="closeCallModal()">&times;</button>
        <a class="call-opt" href="tel:+265891876878">
          <span class="call-carrier tnm">TNM</span>
          <span class="call-num">0891 876 878</span>
        </a>
        <a class="call-opt" href="tel:+265999584831">
          <span class="call-carrier airtel">AIRTEL</span>
          <span class="call-num">0999 584 831</span>
        </a>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val">24<span>/7</span></div><div class="stat-label">Always Available</div></div>
      <div class="stat"><div class="stat-val"><span>★ </span>4.9</div><div class="stat-label">Rider Rating</div></div>
      <div class="stat"><div class="stat-val">2<span>+</span></div><div class="stat-label">Active Lines</div></div>
      <div class="stat"><div class="stat-val">Fast<span>.</span></div><div class="stat-label">Pickup Time</div></div>
    </div>
  </div>
</div>

<script>
// Fallback canvas animation if video fails
var vid = document.getElementById('bgvid');
var cv  = document.getElementById('bgcanvas');

vid.addEventListener('error', startCanvas);
vid.addEventListener('canplay', function(){ vid.playbackRate = 0.5; });
vid.addEventListener('stalled', function(){ setTimeout(function(){ if(vid.readyState < 2) startCanvas(); }, 3000); });
setTimeout(function(){ if(vid.readyState < 2) startCanvas(); }, 4000);

function startCanvas(){
  vid.style.display = 'none';
  cv.style.display  = 'block';
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height, t = 0;

  function rnd(a,b){ return a + Math.random()*(b-a); }
  function newS(){ return { x: rnd(-200, W), y: rnd(H*0.38, H*0.92), len: rnd(40,160), spd: rnd(4,14), col: Math.random()>0.45?'245,194,0':'255,255,255', a: rnd(0.2,0.6), w: Math.random()>0.65?2:1 }; }
  var streaks = Array.from({length:65}, newS);
  var bdots   = Array.from({length:100}, function(){ return { x:rnd(0,W), y:rnd(0,H*0.5), r:rnd(0.4,1.4), a:rnd(0.08,0.35), f:rnd(0,Math.PI*2) }; });

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#07070e'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#0b0b18'; ctx.fillRect(0,0,W,H*0.55);
    bdots.forEach(function(d){
      var al = d.a*(0.5+0.5*Math.sin(t*0.025+d.f));
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,210,80,'+al+')'; ctx.fill();
    });
    streaks.forEach(function(s){
      s.x += s.spd;
      if(s.x > W+s.len) Object.assign(s, newS());
      var g = ctx.createLinearGradient(s.x-s.len,0,s.x+10,0);
      g.addColorStop(0,'rgba('+s.col+',0)');
      g.addColorStop(0.6,'rgba('+s.col+','+s.a+')');
      g.addColorStop(1,'rgba('+s.col+',0)');
      ctx.beginPath(); ctx.strokeStyle=g; ctx.lineWidth=s.w;
      ctx.moveTo(s.x-s.len, s.y); ctx.lineTo(s.x, s.y); ctx.stroke();
    });
    ctx.fillStyle='rgba(7,7,14,0.45)'; ctx.fillRect(0,H*0.52,W,H*0.48);
    [0.57,0.71,0.85].forEach(function(y){
      ctx.beginPath(); ctx.strokeStyle='rgba(45,45,58,0.5)'; ctx.lineWidth=1;
      ctx.moveTo(0,H*y); ctx.lineTo(W,H*y); ctx.stroke();
    });
    t++; requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize', function(){
    cv.width=window.innerWidth; cv.height=window.innerHeight;
    W=cv.width; H=cv.height;
  });
}

function saveContact(){
  var v=['BEGIN:VCARD','VERSION:3.0','FN:ChisaTaxi-Arthur','N:Arthur;ChisaTaxi;;;','ORG:Chisa Taxi','TEL;TYPE=CELL:+265999584831','TEL;TYPE=WORK:+265891876878','EMAIL:arthurdvn@gmail.com','END:VCARD'].join('\n');
  var b=new Blob([v],{type:'text/vcard'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');
  a.href=u; a.download='ChisaTaxi.vcf';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(u);
}

function openWA(){ window.open('https://wa.me/265999584831?text=Hi%20Chisa%20Taxi%2C%20I%20need%20a%20ride!','_blank'); }

function openCallModal(){ document.getElementById('callModal').classList.add('open'); }
function closeCallModal(){ document.getElementById('callModal').classList.remove('open'); }
function bgClose(e){ if(e.target===document.getElementById('callModal')) closeCallModal(); }
</script>
</body>
</html>
